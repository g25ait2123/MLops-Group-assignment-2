name: Inference

on:
  workflow_dispatch:
    inputs:
      input_text:
        description: "Text to classify"
        required: true
        type: string

jobs:
  inference:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - run: pip install -r requirements-inference.txt
      - name: Run Inference
        id: predict
        run: |
          RESULT=$(python src/inference.py "${{ github.event.inputs.input_text }}")
          echo "$RESULT"
          echo "prediction=$RESULT" >> $GITHUB_OUTPUT
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
      - name: Display Result
        run: |
          echo "## 🎯 Inference Result" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Input:** ${{ github.event.inputs.input_text }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**${{ steps.predict.outputs.prediction }}**" >> $GITHUB_STEP_SUMMARY
